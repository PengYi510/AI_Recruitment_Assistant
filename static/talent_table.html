<!--
  talent_table.html — 人才表格模块（样式 + Modal DOM）
  JS 逻辑见 talent_table.js，由 index.html 通过 <script src> 引入。
-->

<style>
  /* ── 人才表格触发按钮气泡 ─────────────────────────── */
  .talent-table-trigger {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #fff;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    cursor: pointer;
    transition: all var(--transition);
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .talent-table-trigger:hover {
    border-color: var(--color-primary);
    box-shadow: 0 2px 8px rgba(22,119,255,.15);
  }
  .talent-table-trigger .ttt-icon { font-size: 28px; flex-shrink: 0; }
  .talent-table-trigger .ttt-body { flex: 1; min-width: 0; }
  .talent-table-trigger .ttt-title {
    font-size: 14px; font-weight: 600; color: #1f2329; margin-bottom: 3px;
  }
  .talent-table-trigger .ttt-desc { font-size: 12px; color: #8f959e; }
  .talent-table-trigger .ttt-arrow {
    font-size: 13px; color: var(--color-primary); flex-shrink: 0; font-weight: 600;
  }

  /* ── 人才表格 Modal ───────────────────────────────── */
  #talent-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    animation: modalFadeIn .2s ease both;
  }
  #talent-modal-overlay.show { display: flex; }

  @keyframes modalFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes modalSlideIn {
    from { opacity: 0; transform: translateY(-24px) scale(.97); }
    to   { opacity: 1; transform: translateY(0)     scale(1); }
  }

  #talent-modal {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,.22);
    width: 92vw;
    max-width: 1100px;
    height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: modalSlideIn .25s ease both;
  }

  #talent-modal-header {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--color-border);
    flex-shrink: 0;
    gap: 12px;
  }
  #talent-modal-header .tmh-icon { font-size: 20px; }
  #talent-modal-title {
    flex: 1; font-size: 16px; font-weight: 600; color: #1f2329;
  }
  #talent-modal-subtitle { font-size: 12px; color: #8f959e; margin-right: 8px; }
  #talent-modal-close {
    width: 28px; height: 28px;
    background: none; border: none; cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #8f959e;
    transition: all var(--transition);
    flex-shrink: 0;
  }
  #talent-modal-close:hover { background: #f5f6f8; color: #333; }

  #talent-modal-body {
    flex: 1; overflow: auto; overflow-x: auto; padding: 0;
  }

  /* ── 表格本体 ─────────────────────────────────────── */
  .talent-table-wrapper {
    width: 100%;
    min-width: 640px;
    max-width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: #fff;
    table-layout: fixed;
  }
  .talent-table-wrapper thead {
    position: sticky; top: 0; z-index: 10; background: #fff;
  }
  .talent-table-wrapper thead th {
    background: #f5f5f5;
    padding: 12px;
    font-weight: 600;
    border-bottom: 2px solid #ddd;
    text-align: left;
    white-space: nowrap;
  }
  .talent-table-wrapper tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid #eee;
    color: #666;
    vertical-align: top;
    word-break: break-word;
    overflow-wrap: break-word;
  }
  .talent-table-wrapper .table-row:hover { background: #fafafa; }

  /* 列宽 */
  .talent-table-wrapper .col-name       { width: 14%; min-width: 100px; }
  .talent-table-wrapper .col-basic-info { width: 16%; min-width: 110px; }
  .talent-table-wrapper .col-hit        { width: 20%; min-width: 130px; }
  .talent-table-wrapper .col-reason     { width: 50%; min-width: 200px; }

  /* 姓名/MIS 列 */
  .talent-name-cell .t-name {
    font-weight: 500; color: #1890ff; word-break: break-word; font-size: 13px;
  }
.talent-name-cell .t-mis,
.talent-name-cell .t-empno { font-size: 12px; color: #999; line-height: 1.3; }
.talent-name-cell .t-empno-link {
  font-size: 12px; color: #1890ff; text-decoration: none; line-height: 1.3;
}
.talent-name-cell .t-empno-link:hover { text-decoration: underline; }

  /* 基本信息列 */
  .text-cell { font-size: 12px; color: #666; line-height: 1.5; }
  .text-cell div { margin-bottom: 4px; }
  .text-cell div:last-child { margin-bottom: 0; }

  /* 命中条件列 */
  .conditions-cell { font-size: 12px; color: #666; line-height: 1.5; }
  .conditions-cell div { margin-bottom: 4px; }
  .conditions-cell div:last-child { margin-bottom: 0; }
  .conditions-cell strong { font-weight: 500; color: #ff9c00; }

  /* 推荐理由列 */
  .reason-cell {
    font-size: 12px; color: #1a1a1a; line-height: 1.6;
    word-break: break-word; font-weight: 600;
  }

  /* 推荐理由详情折叠 */
  .reason-detail-container { margin-top: 8px; }
  .reason-detail-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px;
    background: #f5f5f5; border: 1px solid #e5e6eb; border-radius: 4px;
    cursor: pointer; font-size: 12px; color: #666;
    transition: all var(--transition); user-select: none;
  }
  .reason-detail-toggle:hover { background: #eef0f2; color: #333; }
  .reason-detail-arrow {
    font-size: 14px; transition: transform .3s ease; color: #8f959e;
  }
  .reason-detail-arrow.expanded { transform: rotate(180deg); }
  .reason-detail-content {
    max-height: 0; overflow: hidden;
    transition: max-height .3s ease;
    margin-top: 8px; padding: 0 12px;
    background: #fafafa;
    border-left: 3px solid #d9d9d9; border-radius: 4px;
    font-size: 12px; color: #4e5969; line-height: 1.6;
  }
  .reason-detail-content.expanded {
    max-height: 500px; padding: 12px; overflow-y: auto;
  }
  .reason-detail-item {
    margin-bottom: 12px; padding-bottom: 12px;
    border-bottom: 1px dashed #e5e6eb;
  }
  .reason-detail-item:last-child {
    margin-bottom: 0; padding-bottom: 0; border-bottom: none;
  }
  .reason-detail-source {
    display: inline-block; margin-top: 4px; padding: 2px 8px;
    background: #e8f4ff; color: #3370ff;
    border-radius: 3px; font-size: 11px; font-weight: 500;
  }

  /* 没有更多行 */
  .no-more-row td {
    text-align: center; padding: 16px !important; color: #999; font-size: 13px;
  }

  /* ── 故事线按钮 ───────────────────────────────────── */
  .story-line-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 6px 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: transform .15s, box-shadow .15s;
  }
  .story-line-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, .4);
  }
  .story-line-btn:active { transform: translateY(0); }

  /* ── 故事线弹窗 ───────────────────────────────────── */
  #talent-story-popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 20000;
    align-items: center;
    justify-content: center;
  }
  #talent-story-popup-overlay.show { display: flex; }
  #talent-story-popup {
    position: relative;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,.25);
    width: 560px;
    max-width: 90vw;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #talent-story-popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #eee;
    flex-shrink: 0;
  }
  #talent-story-popup-header h3 { margin: 0; font-size: 15px; font-weight: 600; color: #1d2129; }
  #talent-story-popup-close {
    width: 28px; height: 28px;
    background: none; border: none; cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #8f959e;
    transition: background .15s, color .15s;
  }
  #talent-story-popup-close:hover { background: #f5f6f8; color: #333; }
  #talent-story-popup-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }
  #talent-story-popup-text {
    font-size: 14px;
    line-height: 1.8;
    color: #4e5969;
    white-space: pre-wrap;
    word-break: break-word;
  }
</style>

<!-- 故事线弹窗 DOM -->
<div id="talent-story-popup-overlay" onclick="if(event.target===this) window.TalentTable._closeStoryPopup()">
  <div id="talent-story-popup">
    <div id="talent-story-popup-header">
      <h3>故事线</h3>
      <button id="talent-story-popup-close" onclick="window.TalentTable._closeStoryPopup()" title="关闭">✕</button>
    </div>
    <div id="talent-story-popup-body">
      <div id="talent-story-popup-text"></div>
    </div>
  </div>
</div>

<!-- Modal DOM 结构 -->
<div id="talent-modal-overlay">
  <div id="talent-modal">
    <div id="talent-modal-header">
      <span class="tmh-icon">📊</span>
      <span id="talent-modal-title">候选人列表</span>
      <span id="talent-modal-subtitle"></span>
      <button id="talent-modal-close" title="关闭">✕</button>
    </div>
    <div id="talent-modal-body">
      <!-- 表格内容由 JS 动态插入 -->
    </div>
  </div>
</div>
